name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }} ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'

      - name: Build package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          EXT: ${{ matrix.ext }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE="aidbt_${VERSION}_${GOOS}_${GOARCH}"
          mkdir -p "dist/${PACKAGE}"

          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" \
            go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" \
            -o "dist/${PACKAGE}/aidbt${EXT}" ./cmd/aidbt

          cp README.md LICENSE "dist/${PACKAGE}/"
          cd dist
          zip -r "${PACKAGE}.zip" "${PACKAGE}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: aidbt-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/*.zip --clobber
          else
            gh release create "$TAG_NAME" dist/*.zip --title "$VERSION" --generate-notes --verify-tag
          fi
